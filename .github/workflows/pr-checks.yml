name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  pr-checks:
    name: 🔎 PR — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Vite build (catches compile errors)
        env:
          # Use placeholder values — just verifying the build compiles
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_key
        run: npm run build

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          build-args: |
            VITE_SUPABASE_URL=https://placeholder.supabase.co
            VITE_SUPABASE_ANON_KEY=placeholder_key
